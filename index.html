<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="总裁日程"/>
<meta name="theme-color" content="#1a1a1a"/>
<title>总裁日程管理</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== 基础变量 ===== */
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --border: #E5E3DC;
  --border-light: #F0EEE8;
  --text-primary: #1A1A18;
  --text-secondary: #6B6B65;
  --text-muted: #9E9E97;
  --accent: #1A4FA0;
  --accent-light: #E8EFF9;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text-primary); font-size: 14px; min-height: 100vh; }

/* ===== 顶部导航 ===== */
.header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.header-title { font-size: 17px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
.sync-status { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #9E9E97; flex-shrink: 0; }
.sync-dot.ok { background: #34A853; }
.sync-dot.syncing { background: #FBBC04; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.tabs { display: flex; gap: 0; }
.tab { flex: 1; text-align: center; padding: 8px 4px; font-size: 12px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

/* ===== 统计栏 ===== */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 12px 16px; }
.stat-card { background: var(--surface); border-radius: var(--radius-md); padding: 10px 10px 8px; border: 0.5px solid var(--border); cursor: pointer; transition: all 0.15s; }
.stat-card:hover { border-color: var(--accent); background: var(--accent-light); }
.stat-card.active-filter { border-color: var(--accent); background: var(--accent-light); }
.stat-card.active-filter .stat-label { color: var(--accent); }
.stat-card.active-filter .stat-num { color: var(--accent); }
.stat-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
.stat-num { font-size: 20px; font-weight: 600; color: var(--text-primary); line-height: 1; }

/* ===== 页面内容 ===== */
.page { display: none; padding: 0 16px 80px; }
.page.active { display: block; }

/* ===== 录入区 ===== */
.input-section { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 14px; margin: 12px 0; box-shadow: var(--shadow); }
.input-main { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg); color: var(--text-primary); outline: none; margin-bottom: 10px; }
.input-main:focus { border-color: var(--accent); background: var(--surface); }
.input-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.input-field { flex: 1; min-width: 100px; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text-primary); outline: none; }
.input-field:focus { border-color: var(--accent); }
.input-field.dur { width: 80px; flex: none; }
.btn-submit { width: 100%; padding: 11px; font-size: 14px; font-weight: 500; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; transition: opacity 0.15s; }
.btn-submit:hover { opacity: 0.88; }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== 日程列表 ===== */
.section-label { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin: 16px 0 8px; }
.card { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 13px; margin-bottom: 8px; box-shadow: var(--shadow); }
.card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; line-height: 1.4; }
.card-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.card-actions { display: flex; gap: 4px; flex-shrink: 0; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 4px; border-radius: 6px; line-height: 1; }
.icon-btn:hover { background: var(--bg); color: var(--text-secondary); }
.ai-reason { font-size: 11px; color: var(--text-muted); margin-top: 6px; padding: 5px 9px; background: var(--bg); border-left: 2px solid var(--border); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; line-height: 1.5; }
.picker-wrap { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
.pick-opt { font-size: 11px; padding: 3px 10px; border: 0.5px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--text-secondary); background: transparent; transition: all 0.15s; }
.pick-opt:hover { background: var(--bg); }
.pick-opt.active-urgent { background: #FCEBEB; color: #791F1F; border-color: #F09595; }
.pick-opt.active-important { background: #FEF3E2; color: #6B3800; border-color: #F5C06A; }
.pick-opt.active-normal { background: var(--bg); color: var(--text-secondary); border-color: var(--border); }
.pick-label { font-size: 11px; color: var(--text-muted); }

/* ===== 标签 ===== */
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; display: inline-block; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.badge:hover { opacity: 0.8; }
.b-urgent { background: #FCEBEB; color: #791F1F; }
.b-important { background: #FEF3E2; color: #6B3800; }
.b-normal { background: var(--bg); color: var(--text-secondary); border: 0.5px solid var(--border); }
.b-analyzing { background: var(--accent-light); color: var(--accent); }
.b-time { background: var(--bg); color: var(--text-muted); border: 0.5px solid var(--border); font-size: 11px; padding: 2px 7px; border-radius: 20px; }
.biz-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; display: inline-block; font-weight: 500; cursor: pointer; }

/* ===== 周视图 ===== */
.week-nav { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; }
.week-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.btn-nav { padding: 6px 12px; font-size: 12px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-secondary); cursor: pointer; }
.week-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-lg); border: 0.5px solid var(--border); background: var(--surface); box-shadow: var(--shadow); }
.week-grid { display: grid; grid-template-columns: 44px repeat(7, minmax(80px, 1fr)); min-width: 620px; }
.wg-head { background: var(--bg); padding: 6px 4px; text-align: center; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); font-size: 11px; color: var(--text-muted); }
.wg-head:last-child { border-right: none; }
.wg-head.today { color: var(--accent); font-weight: 600; }
.wg-time { padding: 3px 5px; font-size: 10px; color: var(--text-muted); text-align: right; border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border-light); background: var(--bg); line-height: 1.4; }
.wg-cell { border-right: 0.5px solid var(--border-light); border-bottom: 0.5px solid var(--border-light); min-height: 44px; padding: 3px; position: relative; cursor: pointer; transition: background 0.15s; }
.wg-cell:last-child { border-right: none; }
.wg-cell:hover { background: var(--accent-light); }
.wg-event { font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.now-line { position: absolute; left: 0; right: 0; height: 1.5px; background: #EA4335; z-index: 2; pointer-events: none; }
.now-dot { position: absolute; left: -3px; top: -3px; width: 7px; height: 7px; border-radius: 50%; background: #EA4335; }
.assign-hint { font-size: 10px; color: var(--text-muted); text-align: center; padding: 10px 0; }
.week-tip { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; }

/* ===== 汇总分析 ===== */
.sum-tabs { display: flex; gap: 6px; margin: 12px 0; }
.sum-tab { flex: 1; text-align: center; padding: 8px; font-size: 13px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--surface); color: var(--text-muted); cursor: pointer; }
.sum-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
.chart-card { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
.chart-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
.insight-box { background: var(--accent-light); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 12px; font-size: 12px; color: var(--text-secondary); line-height: 1.8; border-left: 3px solid var(--accent); }
.insight-box strong { color: var(--text-primary); }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.bar-label { font-size: 11px; color: var(--text-muted); width: 72px; flex-shrink: 0; text-align: right; line-height: 1.3; }
.bar-track { flex: 1; height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.bar-right { display: flex; align-items: center; gap: 5px; min-width: 88px; }
.bar-val { font-size: 11px; color: var(--text-primary); font-weight: 500; min-width: 24px; }
.bar-count { font-size: 10px; color: var(--text-muted); }
.trend-up { color: #1E7E34; font-size: 10px; }
.trend-down { color: #C0392B; font-size: 10px; }
.donut-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; flex: 1; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-name { flex: 1; color: var(--text-muted); }
.legend-val { font-weight: 500; color: var(--text-primary); }
.divider { height: 0.5px; background: var(--border-light); margin: 12px 0; }
.sum-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 0.5px solid var(--border-light); font-size: 12px; gap: 8px; }
.sum-item:last-child { border-bottom: none; }
.sum-item-text { flex: 1; min-width: 0; }
.sum-item-text .title { color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sum-item-text .meta { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
.sum-item-badges { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }

/* ===== 空状态 ===== */
.empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; line-height: 1.8; }
.empty-icon { font-size: 32px; margin-bottom: 10px; }

/* ===== Toast ===== */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text-primary); color: #fff; padding: 8px 18px; border-radius: var(--radius-md); font-size: 13px; z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }

/* ===== 响应式 ===== */
@media (min-width: 640px) {
  .page { max-width: 760px; margin: 0 auto; }
  .stats-row { max-width: 760px; margin: 0 auto; }
  .header-top { max-width: 760px; margin: 0 auto; }
  .tabs { max-width: 760px; margin: 0 auto; }
}

/* ===== 详情弹窗 ===== */
.modal-mask{ position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:flex-end;justify-content:center; }
.modal-mask.center{ align-items:center; }
.modal-box{ background:var(--surface);width:100%;max-width:480px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 16px 32px;box-shadow:0 -4px 24px rgba(0,0,0,0.12);animation:slideUp 0.22s ease; }
.modal-mask.center .modal-box{ border-radius:var(--radius-lg);margin:16px; }
@keyframes slideUp{ from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-header{ display:flex;align-items:center;justify-content:space-between;margin-bottom:14px; }
.modal-title{ font-size:15px;font-weight:600;color:var(--text-primary); }
.modal-close{ background:none;border:none;font-size:20px;color:var(--text-muted);cursor:pointer;padding:2px 6px;border-radius:6px; }
.modal-close:hover{ background:var(--bg); }
.modal-section{ margin-bottom:14px; }
.modal-label{ font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:0.04em;margin-bottom:6px; }
.modal-field{ width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);outline:none; }
.modal-field:focus{ border-color:var(--accent); }
.modal-row{ display:flex;gap:8px; }
.modal-row .modal-field{ flex:1; }
.modal-biz-grid{ display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px; }
.modal-biz-opt{ font-size:11px;padding:5px 6px;border:0.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;text-align:center;transition:all 0.15s; }
.modal-pri-row{ display:flex;gap:8px;margin-top:4px; }
.modal-pri-opt{ flex:1;text-align:center;font-size:12px;padding:6px;border:0.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer; }
.modal-pri-opt.sel-urgent{ background:#FCEBEB;color:#791F1F;border-color:#F09595; }
.modal-pri-opt.sel-important{ background:#FEF3E2;color:#6B3800;border-color:#F5C06A; }
.modal-pri-opt.sel-normal{ background:var(--bg);color:var(--text-secondary);border-color:var(--border); }
.modal-actions{ display:flex;gap:8px;margin-top:16px; }
.modal-actions .btn-submit{ flex:1;margin:0; }
.btn-danger{ flex:1;padding:11px;font-size:14px;font-weight:500;background:transparent;color:#C0392B;border:0.5px solid #F09595;border-radius:var(--radius-md);cursor:pointer; }
.btn-danger:hover{ background:#FCEBEB; }
.modal-unassign{ width:100%;margin-top:8px;padding:9px;font-size:13px;background:transparent;color:var(--text-muted);border:0.5px solid var(--border);border-radius:var(--radius-md);cursor:pointer; }
.modal-unassign:hover{ background:var(--bg);color:var(--text-secondary); }

/* ===== 维度管理 ===== */
.dim-card{ background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px;margin-bottom:8px;box-shadow:var(--shadow); }
.dim-card-top{ display:flex;align-items:center;gap:10px;margin-bottom:8px; }
.dim-color-dot{ width:12px;height:12px;border-radius:50%;flex-shrink:0; }
.dim-name{ font-size:14px;font-weight:500;color:var(--text-primary);flex:1; }
.dim-kw{ display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px; }
.kw-tag{ font-size:11px;padding:2px 8px;background:var(--bg);border:0.5px solid var(--border);border-radius:20px;color:var(--text-secondary);display:flex;align-items:center;gap:3px; }
.kw-del{ cursor:pointer;color:var(--text-muted);font-size:13px;line-height:1; }
.kw-del:hover{ color:#C0392B; }
.dim-add-kw{ display:flex;gap:6px;margin-top:4px; }
.dim-add-kw input{ flex:1;padding:5px 9px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);outline:none; }
.dim-add-kw input:focus{ border-color:var(--accent); }
.dim-add-kw button{ padding:5px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-secondary);cursor:pointer; }
.dim-add-kw button:hover{ background:var(--accent);color:#fff;border-color:var(--accent); }
.dim-footer{ display:flex;gap:6px;margin-top:8px; }
.dim-edit-name{ flex:1;padding:6px 9px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);outline:none; }
.dim-edit-name:focus{ border-color:var(--accent); }
.btn-dim-save{ padding:6px 12px;font-size:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer; }
.btn-dim-del{ padding:6px 10px;font-size:12px;background:transparent;color:#C0392B;border:0.5px solid #F09595;border-radius:var(--radius-sm);cursor:pointer; }
.btn-dim-del:hover{ background:#FCEBEB; }
.add-dim-box{ background:var(--surface);border:0.5px dashed var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:16px; }
.add-dim-box .modal-label{ margin-bottom:8px; }
.add-dim-row{ display:flex;gap:8px;margin-bottom:8px; }
.add-dim-row input{ flex:1;padding:8px 10px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);outline:none; }
.add-dim-row input:focus{ border-color:var(--accent); }
.color-picks{ display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px; }
.color-pick{ width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s; }
.color-pick.selected{ border-color:var(--text-primary);transform:scale(1.15); }

/* ===== 钉钉同步 ===== */
.sync-bar { display:flex; align-items:center; gap:8px; padding: 10px 16px; background:var(--surface); border-bottom:0.5px solid var(--border); }
.btn-dingtalk { display:flex; align-items:center; gap:6px; padding:7px 14px; font-size:13px; background:#1677FF; color:#fff; border:none; border-radius:var(--radius-md); cursor:pointer; font-weight:500; transition:opacity 0.15s; }
.btn-dingtalk:hover { opacity:0.88; }
.btn-dingtalk:disabled { opacity:0.5; cursor:not-allowed; }
.sync-tip { font-size:11px; color:var(--text-muted); flex:1; }
.dingtalk-modal-mask { position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:flex;align-items:flex-end;justify-content:center; }
.dingtalk-modal { background:var(--surface);width:100%;max-width:480px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 16px 32px;max-height:80vh;overflow-y:auto; }
.dingtalk-event { display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border-light); }
.dingtalk-event:last-child { border-bottom:none; }
.dingtalk-check { width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:var(--accent); }
.dingtalk-info { flex:1; }
.dingtalk-title { font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:3px; }
.dingtalk-meta { font-size:11px;color:var(--text-muted); }
.dingtalk-imported { font-size:11px;color:#34A853;margin-left:6px; }
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="header">
  <div class="header-top">
    <div class="header-title">总裁日程</div>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">未配置同步</span>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setPage('schedule')">📋 日程</div>
    <div class="tab" onclick="setPage('week')">📅 周视图</div>
    <div class="tab" onclick="setPage('summary')">📊 汇总</div>
    <div class="tab" onclick="setPage('dims')">⚙️ 维度</div>
  </div>
</div>

<!-- 统计栏 -->
<div class="stats-row">
  <div class="stat-card" id="sc-all" onclick="filterByCard('all')"><div class="stat-label">全部</div><div class="stat-num" id="s-all">0</div></div>
  <div class="stat-card" id="sc-week" onclick="filterByCard('week')"><div class="stat-label">本周</div><div class="stat-num" id="s-week">0</div></div>
  <div class="stat-card" id="sc-urgent" onclick="filterByCard('urgent')"><div class="stat-label">紧急</div><div class="stat-num" id="s-urgent">0</div></div>
  <div class="stat-card" id="sc-today" onclick="filterByCard('today')"><div class="stat-label">今日</div><div class="stat-num" id="s-today">0</div></div>
</div>

<!-- 日程页 -->
<!-- 钉钉同步栏 -->
<div class="sync-bar">

function getBiz(key){ return BIZ_DIMS.find(d=>d.key===key) || BIZ_DIMS[11]; }
function guessBiz(text){ for(const d of BIZ_DIMS){ if(d.kw.some(w=>text.includes(w))) return d.key; } return '日常工作'; }
function guessTime(t){
  if(['今天','今日','上午','下午','晚上','早上','中午'].some(w=>t.includes(w))) return '今日';
  if(['本周','这周','周一','周二','周三','周四','周五','星期'].some(w=>t.includes(w))) return '本周';
  return '本月';
}
function fmtDK(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getWeekDates(off=0){
  const now=new Date(), dow=now.getDay()||7, mon=new Date(now);
  mon.setDate(now.getDate()-dow+1+off*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function isToday(d){ return fmtDK(d)===fmtDK(new Date()); }
function nowStr(){ return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ===== Supabase 初始化 =====
async function initSupabase(){
  if(SUPABASE_URL==='YOUR_SUPABASE_URL'){ setSyncStatus('local'); return; }
  try{
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    setSyncStatus('ok');
    await loadFromCloud();
  }catch(e){ setSyncStatus('error'); }
}
function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'), txt=document.getElementById('sync-text');
  if(s==='ok'){ dot.className='sync-dot ok'; txt.textContent='已同步'; }
  else if(s==='syncing'){ dot.className='sync-dot syncing'; txt.textContent='同步中…'; }
  else if(s==='error'){ dot.className='sync-dot'; txt.textContent='同步失败'; }
  else{ dot.className='sync-dot'; txt.textContent='本地存储'; }
}

// ===== 数据读写 =====
function mapFromCloud(row){
  return {
    id: row.id,
    text: row.text,
    bizDim: row.biz_dim || '日常工作',
    priority: row.priority || '普通',
    reason: row.reason || '',
    time: row.time_scope || '本月',
    assignedDate: row.assigned_date || null,
    assignedTime: row.assigned_time || null,
    duration: row.duration || 1,
    created: row.created_at ? new Date(row.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) : ''
  };
}
async function loadFromCloud(){
  if(!sbClient){ loadLocal(); return; }
  try{
    setSyncStatus('syncing');
    const { data, error } = await sbClient.from('schedules').select('*').order('created_at', { ascending: false });
    if(error) throw error;
    schedules = (data || []).map(mapFromCloud);
    setSyncStatus('ok');
    saveLocal();
    renderAll();
  }catch(e){ loadLocal(); setSyncStatus('error'); }
}
function loadLocal(){
  try{ const d=localStorage.getItem('sched_data'); if(d) schedules=JSON.parse(d); }catch(e){}
  renderAll();
}
function saveLocal(){ try{ localStorage.setItem('sched_data', JSON.stringify(schedules)); }catch(e){} }
async function saveToCloud(item){
  saveLocal();
  if(!sbClient) return;
  setSyncStatus('syncing');
  try{
    const { error } = await sbClient.from('schedules').upsert({ id: item.id, text: item.text, biz_dim: item.bizDim, priority: item.priority, reason: item.reason, time_scope: item.time, assigned_date: item.assignedDate, assigned_time: item.assignedTime, duration: item.duration, created_at: new Date().toISOString() });
    if(error) throw error;
    setSyncStatus('ok');
  }catch(e){ setSyncStatus('error'); }
}
async function deleteFromCloud(id){
  saveLocal();
  if(!sbClient) return;
  try{ await sbClient.from('schedules').delete().eq('id', id); setSyncStatus('ok'); }catch(e){ setSyncStatus('error'); }
}

// ===== AI 分类 =====
async function aiClassify(text){
  const dimList = BIZ_DIMS.map(d=>d.key).join('、');
  const prompt = `你是制造业集团总裁秘书助理。分析以下日程事项，返回业务维度和优先级。\n事项：${text}\n业务维度（只选其一）：${dimList}\n注意：「人员面谈」用于一对一谈话、员工面谈、约谈、与某人交流沟通等场景。\n优先级：紧急（今明天内/高层决策/重要客户/截止迫近）、重要（本周内/影响较大）、普通\n只返回JSON：{"bizDim":"集团会议","priority":"重要","reason":"一句话说明原因"}`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:200, messages:[{role:'user',content:prompt}] })
    });
    const data = await res.json();
    const raw = data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    const p = JSON.parse(raw);
    return {
      bizDim: BIZ_DIMS.find(d=>d.key===p.bizDim) ? p.bizDim : guessBiz(text),
      priority: ['紧急','重要','普通'].includes(p.priority) ? p.priority : '普通',
      reason: p.reason||''
    };
  }catch(e){ return { bizDim: guessBiz(text), priority:'普通', reason:'AI 分析暂不可用' }; }
}

// ===== 录入 =====
async function addSchedule(){
  const inp=document.getElementById('sch-input');
  const text=inp.value.trim(); if(!text) return;
  inp.value='';
  const btn=document.getElementById('btn-add');
  btn.disabled=true; btn.textContent='AI 分析中…';
  const dateVal=document.getElementById('sch-date').value;
  const timeVal=document.getElementById('sch-time').value;
  const dur=parseFloat(document.getElementById('sch-dur').value)||1;
  const id=uid();
  const item={ id, text, bizDim:'分析中', priority:'analyzing', reason:'', time:guessTime(text), assignedDate:dateVal||null, assignedTime:timeVal||null, duration:dur, created:nowStr() };
  schedules.unshift(item);
  saveLocal(); renderSchedule(); renderStats();
  const { bizDim, priority, reason } = await aiClassify(text);
  item.bizDim=bizDim; item.priority=priority; item.reason=reason;
  await saveToCloud(item);
  renderAll();
  btn.disabled=false; btn.textContent='✦ AI 录入';
}

// ===== 渲染汇总 =====
function donut(items, totalH){
  const r=36,cx=46,cy=46,sw=12,circ=2*Math.PI*r;
  let off=0;
  const segs=items.filter(i=>i.v>0).map(i=>{
    const dash=circ*(i.v/(totalH||1));
    const s=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${i.color}" stroke-width="${sw}" stroke-dasharray="${dash.toFixed(1)} ${(circ-dash).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=dash; return s;
  });
  return `<svg width="92" height="92" viewBox="0 0 92 92"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#F0EEE8" stroke-width="${sw}"/>${segs.join('')}<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="11" fill="#9E9E97">${totalH}h</text></svg>`;
}
function trendHtml(c,p){
  if(p===0&&c===0) return '';
  if(p===0) return '<span class="trend-up">新增</span>';
  const d=c-p, pct=Math.round(Math.abs(d)/p*100);
  return d>0?`<span class="trend-up">↑${pct}%</span>`:d<0?`<span class="trend-down">↓${pct}%</span>`:'';
}
function renderSummary(){

  const wk=getWeekDates(0).map(fmtDK), pwk=getWeekDates(-1).map(fmtDK);

  const cur=schedules.filter(s=>inScope(s,wk));
  const prev=schedules.filter(s=>s.assignedDate&&(isWeek?pwk:[]).includes(s.assignedDate));
  const totalH=+(cur.reduce((a,s)=>a+(s.duration||1),0).toFixed(1));
  const prevH=+(prev.reduce((a,s)=>a+(s.duration||1),0).toFixed(1));
  const label=isWeek?'本周':'本月', prevLabel=isWeek?'上周':'上月';

  const ds={};
  BIZ_DIMS.forEach(d=>{ ds[d.key]={c:0,h:0,pc:0,ph:0}; });

  prev.forEach(s=>{ if(ds[s.bizDim]){ ds[s.bizDim].pc++; ds[s.bizDim].ph+=+(s.duration||1); } });
  const ps={紧急:{c:0,h:0},重要:{c:0,h:0},普通:{c:0,h:0}};
  cur.forEach(s=>{ if(s.priority!=='analyzing'&&ps[s.priority]){ ps[s.priority].c++; ps[s.priority].h+=+(s.duration||1); } });

  const maxH=Math.max(...BIZ_DIMS.map(d=>ds[d.key].h),0.1);
  const top=BIZ_DIMS.map(d=>({...d,...ds[d.key]})).sort((a,b)=>b.h-a.h)[0];
  const urgN=cur.filter(s=>s.priority==='紧急').length;
  const insight=cur.length===0?'暂无数据，请先在日程页录入事项。':
    `${label}共 <strong>${cur.length} 项</strong>日程，合计约 <strong>${totalH} 小时</strong>。`+
    (top&&top.h>0?` 时间投入最多为 <strong>${top.key}</strong>，约 <strong>${top.h}h</strong>（${Math.round(top.h/(totalH||1)*100)}%）。`:'')+
    (urgN>0?` 有 <strong>${urgN} 项紧急事项</strong>待优先处理。`:'')+
    (prevH>0?` 较${prevLabel}（${prevH}h）${totalH>prevH?'增加':'减少'} <strong>${Math.abs(+(totalH-prevH).toFixed(1))}h</strong>。`:'');

  document.getElementById('summary-content').innerHTML=`
    <div class="insight-box">${insight}</div>
    <div class="chart-card">
      <div class="chart-title">业务维度时间分配</div>
      <div class="donut-row">
        ${donut(BIZ_DIMS.map(d=>({v:ds[d.key].h,color:d.color})),totalH)}
        <div class="legend-grid">${BIZ_DIMS.map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div><span class="legend-name">${d.key}</span><span class="legend-val">${ds[d.key].h}h</span></div>`).join('')}</div>
      </div>
      <div class="divider"></div>
      ${BIZ_DIMS.map(d=>`<div class="bar-row">
        <span class="bar-label">${d.key}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(ds[d.key].h/maxH*100)}%;background:${d.color}"></div></div>
        <div class="bar-right"><span class="bar-val">${ds[d.key].h}h</span><span class="bar-count">${ds[d.key].c}项</span>${trendHtml(ds[d.key].h,ds[d.key].ph)}</div>
      </div>`).join('')}
    </div>
    <div class="chart-card">
      <div class="chart-title">优先级时间分配</div>
      <div class="donut-row">
        ${donut(['紧急','重要','普通'].map(p=>({v:ps[p].h,color:PRI[p].color})),totalH)}

// ===== 钉钉日历自动同步 =====
let dingtalkEvents = [];
let isSyncingDingtalk = false;

async function fetchDingtalkEvents(){
  const now = new Date();
  const timeMin = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  const timeMax = new Date(now.getFullYear(), now.getMonth() + 2, 0, 23, 59, 59).toISOString();
  const res = await fetch(`/.netlify/functions/dingtalk-calendar?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}`);
  const data = await res.json();
  if(!data.success) throw new Error(data.error || '获取失败');
  return data.events || [];
}

async function autoSyncDingtalk(showToast=false){
  if(isSyncingDingtalk) return;
  isSyncingDingtalk = true;
  const btn = document.getElementById('btn-dingtalk');
  const tip = document.getElementById('dingtalk-tip');
  if(btn){ btn.disabled=true; btn.textContent='⏳ 同步中…'; }
  try{
    const events = await fetchDingtalkEvents();
    dingtalkEvents = events;
    let added=0, removed=0;

    // 1. 新增：钉钉有但本地没有的
    for(const e of events){
      const exists = schedules.find(s=>s.dingId===e.id);
      if(!exists){
        const start = e.start ? new Date(e.start) : null;
        const dateStr = start ? `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}` : null;
        const timeStr = start ? `${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}` : null;
        const end = e.end ? new Date(e.end) : null;
        const dur = (start&&end) ? +((end-start)/3600000).toFixed(1) : 1;
        const id = uid();
        const item = {
          id, text:e.title, bizDim:'分析中', priority:'analyzing', reason:'',
          time:'本月', assignedDate:dateStr, assignedTime:timeStr,
          duration:dur, created:nowStr(), dingId:e.id
        };
        schedules.unshift(item);
        added++;
        saveLocal();
        await saveToCloud(item);
        // AI 分类异步处理
        aiClassify(e.title).then(({bizDim,priority,reason})=>{
          const s=schedules.find(i=>i.id===id);
          if(s){s.bizDim=bizDim;s.priority=priority;s.reason=reason;saveToCloud(s);renderAll();}
        });
      }
    }

    // 2. 删除：本地有 dingId 但钉钉已删除的
    const dingIds = new Set(events.map(e=>e.id));
    const toRemove = schedules.filter(s=>s.dingId && !dingIds.has(s.dingId));
    for(const s of toRemove){
      schedules = schedules.filter(i=>i.id!==s.id);
      await deleteFromCloud(s.id);
      removed++;
    }

    saveLocal();
    renderAll();
    const msg = added>0||removed>0
      ? `钉钉同步完成：新增 ${added} 条${removed>0?'，移除 '+removed+' 条':''}`
      : '钉钉日历已是最新';
    if(tip) tip.textContent = `上次同步：${nowStr()}，共 ${events.length} 条`;
    if(showToast||added>0||removed>0) toast(msg);
  }catch(e){
    if(tip) tip.textContent = '同步失败，请检查网络';
    if(showToast) toast('钉钉同步失败：'+e.message);
  }
  if(btn){ btn.disabled=false; btn.textContent='📅 从钉钉日历同步'; }
  isSyncingDingtalk = false;
}

async function deleteDim(key){
  const idx = BIZ_DIMS.findIndex(d=>d.key===key);
  if(idx===-1) return;
  if(BIZ_DIMS.length<=1){ toast('至少保留一个维度'); return; }
  // 找一个替代维度（优先用「日常工作」，没有则用第一个其他维度）
  const fallback = BIZ_DIMS.find(d=>d.key!==key&&d.key==='日常工作') || BIZ_DIMS.find(d=>d.key!==key);
  const affected = schedules.filter(s=>s.bizDim===key);
  if(affected.length>0){
    const confirm = window.confirm(`删除「${key}」后，已有 ${affected.length} 条日程将自动归入「${fallback.key}」，确认删除？`);
    if(!confirm) return;
    // 批量更新受影响日程
    for(const s of affected){
      s.bizDim = fallback.key;
      await saveToCloud(s);
    }
    saveLocal();
  }
  BIZ_DIMS.splice(idx,1);
  saveDims();
  expandedDim=null;
  renderDims();
  renderAll();
  toast(`维度已删除，${affected.length} 条日程已归入「${fallback.key}」`);
}

async function saveDimName(key){
  const input = document.getElementById('dim-name-input-'+key.replace(/\s/g,'_'));
  if(!input) return;
  const newName = input.value.trim();
  if(!newName){ toast('名称不能为空'); return; }
  if(newName===key){ toast('名称未变更'); return; }
  if(BIZ_DIMS.find(d=>d.key===newName)){ toast('名称已存在'); return; }
  const dim = BIZ_DIMS.find(d=>d.key===key);
  if(!dim) return;
  const affected = schedules.filter(s=>s.bizDim===key);
  // 同步更新所有已选该维度的日程
  for(const s of affected){
    s.bizDim = newName;
    await saveToCloud(s);
  }
  dim.key = newName;
  expandedDim = newName;
  saveDims();
  saveLocal();
  renderDims();
  renderAll();
  toast(`已重命名为「${newName}」，${affected.length} 条日程同步更新`);
}

  const kw = input.value.trim();

  const dim = BIZ_DIMS.find(d=>d.key===key);
  if(!dim) return;
  if(!dim.kw.includes(kw)) dim.kw.push(kw);
  input.value='';
  saveDims();
  renderDims();
}

function delKw(key, kw){
  const dim = BIZ_DIMS.find(d=>d.key===key);
  if(!dim) return;
  dim.kw = dim.kw.filter(k=>k!==kw);
  saveDims();
  renderDims();
}

  updatePriUI();
  document.getElementById('detail-modal').style.display='flex';
}
function closeDetailModal(){
  document.getElementById('detail-modal').style.display='none';
  modalId=null;
}
function closeModal(e){
  if(e.target.id==='detail-modal') closeDetailModal();
}
function selectModalBiz(dim){
  const s=schedules.find(i=>i.id===modalId);
  if(!s) return;
  s.bizDim=dim;
  const grid=document.getElementById('modal-biz-grid');
  BIZ_DIMS.forEach(d=>{
    const el=document.getElementById('biz-opt-'+d.key.replace(/\s/g,'_'));
    if(el){
      el.style.background=dim===d.key?d.bg:'transparent';
      el.style.color=dim===d.key?d.tc:'var(--text-secondary)';
      el.style.borderColor=dim===d.key?d.color:'var(--border)';
    }
  });
}
function selectModalPri(p){
  modalPri=p;
  updatePriUI();
}
function updatePriUI(){
  document.getElementById('pri-opt-urgent').className='modal-pri-opt'+(modalPri==='紧急'?' sel-urgent':'');
  document.getElementById('pri-opt-important').className='modal-pri-opt'+(modalPri==='重要'?' sel-important':'');
  document.getElementById('pri-opt-normal').className='modal-pri-opt'+(modalPri==='普通'?' sel-normal':'');
}
async function saveFromModal(){
  const s=schedules.find(i=>i.id===modalId);
  if(!s) return;
  s.text=document.getElementById('modal-text').value.trim()||s.text;
  s.assignedDate=document.getElementById('modal-date').value||null;
  s.assignedTime=document.getElementById('modal-time').value||null;
  s.duration=parseFloat(document.getElementById('modal-dur').value)||1;
  s.priority=modalPri;
  await saveToCloud(s);
  closeDetailModal();
  renderAll();
  toast('已保存');
}
async function deleteFromModal(){
  if(!modalId) return;
  await deleteSchedule(modalId);
  closeDetailModal();
  toast('已删除');
}
async function unassignFromModal(){
  const s=schedules.find(i=>i.id===modalId);
  if(!s) return;
  s.assignedDate=null;
  s.assignedTime=null;
  await saveToCloud(s);
  closeDetailModal();
  renderAll();
  toast('已移回待安排列表');
}

function renderAll(){ renderStats(); if(currentPage==='schedule') renderSchedule(); else if(currentPage==='week') renderWeek(); else if(currentPage==='summary') renderSummary(); }

// ===== 键盘录入 =====
document.getElementById('sch-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addSchedule(); });

// ===== 自动同步：每30秒从云端拉取最新数据 =====
async function autoSync(){
  if(!sbClient) return;
  try{
    const { data, error } = await sbClient.from('schedules').select('*').order('created_at', { ascending: false });
    if(error) return;
    // 只有数据有变化时才更新，避免不必要的重渲染
    const newJson = JSON.stringify(data);
    const oldJson = JSON.stringify(schedules);
    if(newJson !== oldJson){
      schedules = (data || []).map(mapFromCloud);
      saveLocal();
      renderAll();
      setSyncStatus('ok');
    }
  }catch(e){}
}

// ===== 页面可见时立即同步（切换标签页/手机解锁时触发）=====
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible') autoSync();
});

// ===== 启动 =====
initSupabase();

// 加载自定义维度
loadDims();

// 页面加载完成后自动同步钉钉日历
setTimeout(()=>autoSyncDingtalk(false), 2000);

// 每30分钟自动同步一次钉钉
setInterval(()=>autoSyncDingtalk(false), 30*60*1000);

// 每30秒同步 Supabase 数据
setInterval(autoSync, 30000);
</script>
